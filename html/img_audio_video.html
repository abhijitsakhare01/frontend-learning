<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <!-- Audio Example -->
        <h1>Audio Example</h1>
        <audio controls autoplay loop muted>
            <source src="docs/audio.mp3" type="audio/mp3" />
        </audio>

        <audio controls autoplay loop muted>
            <source src="docs/audio1.mp3" type="audio/mp3" />
        </audio>

        <hr>
        
        <!-- Video Example -->

        <h1>Video Example</h1>

        <video controls autoplay loop muted>
            <source src="docs/video.mp4" type="video/mp4" />
        </video>

        <video controls poster="image/girl.jpg">
            <source src="docs/video1.mp4" type="video/mp4" />
        </video>

        <hr>
        <!-- Image Example -->
        <h1>Image Example</h1>

        <img src="image/boy.jpg" alt="boy" />

        <img src="image/girl.jpg" alt="girl" />

        <hr>
        <!-- Picture Example -->
        <h1>Picture Example</h1>
        <picture>
            <img src="image/natural.jpg" alt="natural" />
        </picture>

        <hr>
        <!-- Figure Example -->
        <h1>Figure Example</h1>
        <figure>
            <img src="image/the sun.jpg" alt="sun" />
        </figure>
    </body>
</html>
