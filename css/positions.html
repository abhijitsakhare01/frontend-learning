<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Type Of Positions five */

        .box{
            width: 200px;
            height: 150px;
            border: 3px solid red;
            padding: 20px;
            background-color: grey;
            margin-bottom: 10px;
        }
        .box1{
            position: static;
        }
        .box2{
            position: relative;
            left: 250px;
            top: 40px;
        }
        .box3{
            position: absolute;
            left: 300px;
            top: 20px;
        }
        .box4{
            position: sticky;
            top: 10px;
        }
        .box5{
            position: fixed;
            bottom: 0px; 
            right: 10px; 
        }
    </style>
</head>
<body>
    <!-- Type Of Positions five -->
    <div class="box box1">Static</div>
    <div class="box box2">Relative</div>
    <div class="box box3">Absolute</div>
    <div class="box box4">Sticky</div>
    <div class="box box5">Fixed</div>  

    <h1>Hey</h1>  <h1>Hey</h1>  <h1>Hey</h1>  <h1>Hey</h1>  <h1>Hey</h1>  <h1>Hey</h1>  <h1>Hey</h1>  <h1>Hey</h1>  <h1>Hey</h1>  <h1>Hey</h1> 
</body>
</html>
