<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <!-- Flex Example -->
        <style>
        .flex-itms{
            width: 150px;
            height: 100px;
            background-color: blueviolet;
            border: 3px;
            border-radius: 30px;
            margin: 20px;
            padding: 40px;
            color: white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-content: center;
        }
        .flex-container{
            display: flex;
            flex-direction: row ;
            flex-wrap: wrap ;
            justify-content: center;
            
        }

     </style>

    </head>
    <body>
        <!-- Flex Example -->
        <!-- ul.flex-container>li.flex-itms*10  short cuts-->

        <ul class="flex-container">
            <li class="flex-itms">1</li>
            <li class="flex-itms">2</li>
            <li class="flex-itms">3</li>
            <li class="flex-itms">4</li>
            <li class="flex-itms">5</li>
            <li class="flex-itms">6</li>
            <li class="flex-itms">7</li>
            <li class="flex-itms">8</li>
            <li class="flex-itms">9</li>
            <li class="flex-itms">10</li>
        </ul>

    </body>
</html>
