<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <!-- Internal Css Use Example Second Priority -->
        <style>
        /* Text Animation Example */

        .text-container{
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            font-family: sans-serif;
            font-weight: 700px;
            perspective: 80px;

        }
        .text-container > b{
            height: 70px;
            box-shadow: 0px 20px 10px gray;
            background-color: darkgoldenrod;
            background-clip: text;
            color: transparent;
            transform-origin: bottom;
            animation: getUpDown 10s infinite;
        }
        .text-container > b :nth-child(1){
          animation-delay: 0s;
        
        }
         .text-container > b :nth-child(2){
          animation-delay: 0.30s;
          
        }
         .text-container > b :nth-child(4){
          animation-delay: 0.35s;
        }
         .text-container > b :nth-child(5){
          animation-delay: 0.45s;
        }
         .text-container > b :nth-child(6){
          animation-delay: 0.55s;
        }
         .text-container > b :nth-child(7){
          animation-delay: 0.65s;
        }

        @keyframes getUpDown{
            from{transform: rotateX(-85deg);}
            10%,50%{transform: rotateX(0);}
            60%,to{transform: rotateX(-85deg);}
        }


    </style>
    </head>
    <body>
        <!-- Text Animation Example -->
        <div class="text-container">
            <b>A</b><b>B</b><b>H</b><b>I</b><b>J</b><b>I</b><b>T</b>
        </div>
    </body>
</html>
