<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <!-- Internal Css Use this Second Priority -->
        <style>
      /* Nth child Concept Example */

        ul{

            width: 200px;
            padding:20px;
            list-style-type: none;

        }
        li{
            padding: 8px;
            border: 2px solid red;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        li:nth-child(odd){
            border-color: blue;
        }
        li:nth-child(even){
            background-color: yellow;
        }
        li:nth-child(5){
            background-color: chocolate;
            color: aliceblue;
            

        }
        li:first-child{
            background-color: aquamarine;
        }
        li:last-child{
            background-color: fuchsia;
        }
       
      
        
    </style>
    </head>
    <body>
        <!-- Nth child Concept Example -->

        <!-- ul>li*8{item $} short cut-->
        <h1>Nth child Concept</h1>
        <ul>
            <li>item 1</li>
            <li>item 2</li>
            <li>item 3</li>
            <li>item 4</li>
            <li>item 5</li>
            <li>item 6</li>
            <li>item 7</li>
            <li>item 8</li>
        </ul>
    </body>
</html>
