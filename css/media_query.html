<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
        /* MEDIA QUERIES  */
        /* Mobile first , we star from the smallest viewport width */
        @media only screen and (min-width:320px) and (max-width:767px) {
           body{
            
            background: red;
        }
        p{
            display: none;
        }
        h1,h3{
            color: white;
        }
        img{
            display: none;
        } 
        }
        
        /* From 768px and up */
        @media (min-width: 768px) {
            body {
                background-color: aquamarine;
            }

            p {
                color: blue;
            }
        }

        @media (min-width: 1024px) {
            body {
                background-color: red;
            }

            p {
                color: rgb(80, 162, 25);
            }
        }

        @media (min-width: 1224px) {
            body {
                background-color: rgb(205, 65, 34);
            }

            p {
                color: rgb(0, 187, 255);
            }
        }

        @media (min-width: 1224px) {
            body {
                background-color: aquamarine;
            }

            p {
                color: blue;
            }
        }

        @media (min-width: 1824px) {
            body {
                background-color: aquamarine;
            }

            p {
                color: blue;
            }
        }
    </style>
    </head>

    <body>
        <!-- Media query Exampls -->
        <img src="image/girl.jpg" alt="image">
        <h1>CSS Media Queries</h1>
        <p>The Backgroubd will change according to the viewport width change</p>

        <h3>Samartphones - <span class="details">From 320px and up</span>
            (min-will) </h3>

        <p>BLUE</p>
        <br>

    </body>

</html>
