<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Bootstrap demo</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous">

    </head>
    <body>
        <!-- header start -->

        <header>
            <nav class="navbar navbar-expand-lg bg-info">
                <div class="container">
                    <a class="navbar-brand" href="#">
                        <img src="image/logo.jpg" alt="Logo" width="30"
                            height="24"
                            class="d-inline-block align-text-top">
                        TechNavo
                    </a>
                    <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent"
                        aria-controls="navbarSupportedContent"
                        aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse"
                        id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active bg-danger"
                                    aria-current="page"
                                    href="index.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="about.html">about
                                    Us</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link"
                                    href="services.html">Services</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link"
                                    href="products.html">Products</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle"
                                    href="gallery.html"
                                    role="button" data-bs-toggle="dropdown"
                                    aria-expanded="false">
                                    Gallery
                                </a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item"
                                            href="#">photo</a></li>
                                    <li><a class="dropdown-item" href="#">video
                                        </a></li>
                                    <!-- <li><hr class="dropdown-divider "></li>
                                     <li><a class="dropdown-item " href="#">Something
                                        else here</a></li> -->
                                </ul>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link"
                                    href="contact.html">contact Us</a>
                            </li>
                            <!-- <li class="nav-item">
                            <a class="nav-link disabled"
                                aria-disabled="true">Disabled</a>
                        </li>  -->
                        </ul>
                        <form class="d-flex" role="search">
                            <input class="form-control me-2" type="search"
                                placeholder="Search" aria-label="Search" />
                            <button
                                class="btn btn-outline-success bg-danger text-light"
                                type="submit">Search</button>
                        </form>
                    </div>
                </div>
            </nav>
        </header>
        <!-- header End -->

        <!-- main end -->
        <main>
            <!-- slider start -->
            <section>
                <div id="carouselExampleIndicators" class="carousel slide"
                    data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <button type="button"
                            data-bs-target="#carouselExampleIndicators"
                            data-bs-slide-to="0" class="active"
                            aria-current="true" aria-label="Slide 1"></button>
                        <button type="button"
                            data-bs-target="#carouselExampleIndicators"
                            data-bs-slide-to="1" aria-label="Slide 2"></button>
                        <button type="button"
                            data-bs-target="#carouselExampleIndicators"
                            data-bs-slide-to="2" aria-label="Slide 3"></button>

                        <button type="button"
                            data-bs-target="#carouselExampleIndicators"
                            data-bs-slide-to="3" aria-label="Slide 4"></button>

                        <button type="button"
                            data-bs-target="#carouselExampleIndicators"
                            data-bs-slide-to="4" aria-label="Slide 5"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="image/slider1.jpg" class="d-block w-100"
                                alt="Name image1">
                        </div>
                        <div class="carousel-item">
                            <img src="image/slider2.jpg" class="d-block w-100"
                                alt="image2">
                        </div>
                        <div class="carousel-item">
                            <img src="image/slider3.jpg" class="d-block w-100"
                                alt="image3">
                        </div>
                        <div class="carousel-item">
                            <img src="image/slider4.jpg" class="d-block w-100"
                                alt="image4">
                        </div>
                        <div class="carousel-item">
                            <img src="image/slider5.jpg" class="d-block w-100"
                                alt="image5">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button"
                        data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"
                            aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button"
                        data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon"
                            aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </section>
            <!-- slider end -->

        </main>
        <!-- main end -->

        <h1>Index Page</h1>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
